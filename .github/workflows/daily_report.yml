name: 台指策略日報自動寄信

on:
  # ── 主要觸發：由 cron-job.org 在台灣時間 07:30 精準呼叫 GitHub API ──
  repository_dispatch:
    types: [trigger-daily-report]

  # ── 備援觸發：萬一外部排程失效，UTC 22:13（台灣 06:13）仍會自動執行 ──
  schedule:
    - cron: '13 22 * * 0-4'

  # ── 手動觸發按鈕（可在 GitHub Actions 頁面測試）──
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. 下載儲存庫程式碼 ──────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. 設定 Python 環境 ──────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 安裝中文字型（matplotlib 中文顯示用）─────────────
      - name: 🔤 Install CJK fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv
          echo "✅ 中文字型安裝完成"

      # ── 4. 安裝 Python 套件 ──────────────────────────────────
      - name: 📦 Install Python packages
        run: |
          pip install --upgrade pip
          pip install \
            yfinance \
            python-pptx \
            pandas \
            numpy \
            matplotlib \
            requests \
            holidays

      # ── 5. 執行日報產生 + 自動寄信 ──────────────────────────
      - name: 📊 Generate report and send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL:   ${{ secrets.TO_EMAIL }}
        run: python run_and_send.py

      # ── 6. 上傳 PPTX 作為 Artifact（備份，可選）────────────
      - name: 💾 Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 台股策略日報
          path: reports/*.pptx
          retention-days: 30
          if-no-files-found: ignore
